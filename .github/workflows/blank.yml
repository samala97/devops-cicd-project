name: Build and Deploy .NET 8 to IIS (Ubuntu)

on:
  workflow_dispatch:

jobs:

# ================= BUILD =================
  build:
    runs-on: ubuntu-latest

    env:
      buildConfiguration: Release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration $buildConfiguration

    - name: Publish
      run: dotnet publish --configuration $buildConfiguration -o publish

    - name: Zip Artifact
      run: |
        cd publish
        zip -r ../WebApp.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: drop
        path: WebApp.zip


# ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: drop

    # ✅ Install PowerShell on Ubuntu
    - name: Install PowerShell
      run: |
        sudo apt-get update
        sudo apt-get install -y powershell

    # ✅ Deploy to IIS using WinRM
    - name: Deploy to IIS VM
      shell: pwsh
      env:
        VM_IP: ${{ secrets.VM_IP }}
        USERNAME: ${{ secrets.VM_USERNAME }}
        PASSWORD: ${{ secrets.VM_PASSWORD }}
      run: |

        $secpasswd = ConvertTo-SecureString $env:PASSWORD -AsPlainText -Force
        $cred = New-Object System.Management.Automation.PSCredential ($env:USERNAME, $secpasswd)

        $session = New-PSSession -ComputerName $env:VM_IP -Credential $cred -Authentication Basic -Port 5985

        # Copy ZIP to VM
        Copy-Item -Path "WebApp.zip" -Destination "C:\temp\WebApp.zip" -ToSession $session

        Invoke-Command -Session $session -ScriptBlock {

            Import-Module WebAdministration

            # Create App Pool
            if (!(Test-Path "IIS:\AppPools\MyIISWebsite")) {
                New-WebAppPool -Name "MyIISWebsite"
            }

            # Create Website
            if (!(Test-Path "IIS:\Sites\MyIISWebsite")) {
                New-Website -Name "MyIISWebsite" `
                  -Port 80 `
                  -PhysicalPath "C:\inetpub\wwwroot\MyIISWebsite" `
                  -ApplicationPool "MyIISWebsite"
            }

            # Create Application
            if (!(Test-Path "IIS:\Sites\MyIISWebsite\Rishi12")) {
                New-WebApplication `
                  -Site "MyIISWebsite" `
                  -Name "Rishi12" `
                  -PhysicalPath "C:\inetpub\wwwroot\Rishi12" `
                  -ApplicationPool "MyIISWebsite"
            }

            # Stop Site
            Stop-Website -Name "MyIISWebsite"

            # Deploy
            $dest = "C:\inetpub\wwwroot\Rishi12"

            if (Test-Path $dest) {
                Remove-Item "$dest\*" -Recurse -Force
            }

            Expand-Archive -Path "C:\temp\WebApp.zip" -DestinationPath $dest -Force

            # Start Site
            Start-Website -Name "MyIISWebsite"
        }

        Remove-PSSession $session
