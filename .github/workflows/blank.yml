name: Build and Deploy .NET 8 to IIS

on:
  push:
    branches:
      - Dev

jobs:

# ================= BUILD JOB =================
  build:
    name: Build .NET App
    runs-on: windows-latest

    env:
      buildConfiguration: Release
      artifactName: drop

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Restore Packages
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration $env:buildConfiguration

    - name: Publish Project
      run: |
        dotnet publish --configuration $env:buildConfiguration `
        --output ./publish

    - name: Zip Published Output
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath WebApp.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: drop
        path: WebApp.zip


# ================= DEPLOY JOB =================
  deploy:
    name: Deploy to IIS
    runs-on: self-hosted   # ⚠️ Your VM runner
    needs: build

    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: drop
        path: .

    # ✅ Create IIS Website + App Pool
    - name: Setup IIS Website
      run: |
        Import-Module WebAdministration

        if (!(Test-Path "IIS:\Sites\MyIISWebsite")) {
            New-Website -Name "MyIISWebsite" `
              -Port 80 `
              -PhysicalPath "C:\inetpub\wwwroot\MyIISWebsite" `
              -ApplicationPool "MyIISWebsite"
        }

        if (!(Test-Path "IIS:\AppPools\MyIISWebsite")) {
            New-WebAppPool -Name "MyIISWebsite"
        }

    # ✅ Create Application
    - name: Create IIS Application
      run: |
        Import-Module WebAdministration

        if (!(Test-Path "IIS:\Sites\MyIISWebsite\Rishi12")) {
            New-WebApplication `
              -Site "MyIISWebsite" `
              -Name "Rishi12" `
              -PhysicalPath "C:\inetpub\wwwroot\Rishi12" `
              -ApplicationPool "MyIISWebsite"
        }

    # ✅ Stop Website
    - name: Stop IIS Website
      run: |
        Stop-Website -Name "MyIISWebsite"

    # ✅ Deploy ZIP
    - name: Deploy Application
      run: |
        $zipPath = "WebApp.zip"
        $destination = "C:\inetpub\wwwroot\Rishi12"

        if (Test-Path $destination) {
            Remove-Item "$destination\*" -Recurse -Force
        }

        Expand-Archive -Path $zipPath -DestinationPath $destination -Force

    # ✅ Start Website
    - name: Start IIS Website
      run: |
        Start-Website -Name "MyIISWebsite"
